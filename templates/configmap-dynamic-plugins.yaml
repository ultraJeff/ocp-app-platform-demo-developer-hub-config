kind: ConfigMap
apiVersion: v1
metadata:
  name: dynamic-plugins
  namespace: rhdh
  labels:
    app.kubernetes.io/name: backstage
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
data:
  dynamic-plugins.yaml: |
    includes:
      - dynamic-plugins.default.yaml
    plugins:
      # Disable the quickstart plugin to avoid distracting people on initial sign-in
      - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-quickstart
        disabled: true

      # Bulk import plugins (https://docs.redhat.com/en/documentation/red_hat_developer_hub/1.8/html/configuring_dynamic_plugins/bulk-importing-github-repositories)
      - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-bulk-import-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-bulk-import
        disabled: false

      # MCP Server plugins
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-mcp-actions-backend:bs_1.45.3__0.1.5
        disabled: false
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-software-catalog-mcp-tool:bs_1.45.3__0.4.1
        disabled: false
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-techdocs-mcp-tool:bs_1.45.3__0.3.2
        disabled: false

      # Bundled plugins (still in RHDH 1.9 image)
      - package: ./dynamic-plugins/dist/backstage-plugin-scaffolder-backend-module-gitlab-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-topology
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-catalog-backend-module-keycloak-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-catalog-backend-module-gitlab-dynamic
        disabled: false

      # Disable old ArgoCD plugins (removed/renamed in 1.9)
      - package: ./dynamic-plugins/dist/roadiehq-scaffolder-backend-argocd-dynamic
        disabled: true
      - package: ./dynamic-plugins/dist/roadiehq-backstage-plugin-argo-cd-backend-dynamic
        disabled: true
      - package: ./dynamic-plugins/dist/backstage-community-plugin-redhat-argocd
        disabled: true

      # New ArgoCD plugins (OCI)
      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/roadiehq-backstage-plugin-argo-cd-backend:bs_1.45.3__4.6.0'
        disabled: false
      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-argocd:bs_1.45.3__2.4.4'
        disabled: false
      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/roadiehq-scaffolder-backend-argocd:bs_1.45.3__1.8.1'
        disabled: false

      # Tekton (unbundled in 1.9, moved to OCI)
      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-tekton:bs_1.45.3__3.33.3'
        disabled: false

      # Lightspeed plugins
      - disabled: false
        package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-lightspeed:bs_1.45.3__1.2.3
        pluginConfig:
          dynamicPlugins:
            frontend:
              red-hat-developer-hub.backstage-plugin-lightspeed:
                appIcons:
                  - name: LightspeedIcon
                    module: LightspeedPlugin
                    importName: LightspeedIcon
                dynamicRoutes:
                  - importName: LightspeedPage
                    menuItem:
                      icon: LightspeedIcon
                      text: Lightspeed
                    module: LightspeedPlugin
                    path: /lightspeed
                translationResources:
                  - importName: lightspeedTranslations
                    module: Alpha
                    ref: lightspeedTranslationRef
      - disabled: false
        package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-lightspeed-backend:bs_1.45.3__1.2.3

      # Header customisation via global header plugin
      - disabled: false
        package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-global-header
        pluginConfig:
          app:
            sidebar:
              search: false
              settings: false
          dynamicPlugins:
            frontend:
              default.main-menu-items:
                menuItems:
                  default.create:
                    title: ''
              red-hat-developer-hub.backstage-plugin-global-header:
                mountPoints:
                  - mountPoint: application/header
                    importName: GlobalHeader
                    config:
                      position: above-main-content
                  - mountPoint: global.header/component
                    importName: SearchComponent
                    config:
                      priority: 100
                  - mountPoint: global.header/component
                    importName: Spacer
                    config:
                      priority: 99
                      props:
                        growFactor: 0
                  - mountPoint: global.header/component
                    importName: HeaderIconButton
                    config:
                      priority: 90
                      props:
                        title: Self-service
                        icon: add
                        to: create
                  - mountPoint: global.header/component
                    importName: StarredDropdown
                    config:
                      priority: 85
                  - mountPoint: global.header/component
                    importName: ApplicationLauncherDropdown
                    config:
                      priority: 82
                  - mountPoint: global.header/component
                    importName: SupportButton
                    config:
                      priority: 80
                  # - mountPoint: global.header/component
                  #   importName: NotificationButton
                  #   config:
                  #     priority: 70
                  - mountPoint: global.header/component
                    importName: Divider
                    config:
                      priority: 50
                  - mountPoint: global.header/component
                    importName: ProfileDropdown
                    config:
                      priority: 10
                  - mountPoint: global.header/profile
                    importName: MenuItemLink
                    config:
                      priority: 100
                      props:
                        title: Settings
                        link: /settings
                        icon: manageAccounts
                  - mountPoint: global.header/profile
                    importName: LogoutButton
                    config:
                      priority: 10
                  - mountPoint: global.header/application-launcher
                    importName: MenuItemLink
                    config:
                      section: Documentation
                      priority: 150
                      props:
                        title: Developer Hub
                        icon: developerHub
                        link: https://docs.redhat.com/en/documentation/red_hat_developer_hub
                  - mountPoint: global.header/application-launcher
                    importName: MenuItemLink
