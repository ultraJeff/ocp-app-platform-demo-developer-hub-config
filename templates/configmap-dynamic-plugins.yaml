      # Azure DevOps plugins
      - package: ./dynamic-plugins/dist/backstage-community-plugin-azure-devops-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-azure-devops
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-azure-devops:
                mountPoints:
                  - mountPoint: entity.page.ci/cards
                    importName: EntityAzurePipelinesContent
                    config:
                      layout:
                        gridColumn: 1 / -1
                    if:
                      allOf:
                        - isKind: component
                  - mountPoint: entity.page.pull-requests/cards
                    importName: EntityAzurePullRequestsContent
                    config:
                      layout:
                        gridColumn: 1 / -1
                    if:
                      allOf:
                        - isKind: component
      - package: ./dynamic-plugins/dist/backstage-plugin-scaffolder-backend-module-azure-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/roadiehq-scaffolder-backend-module-http-request-dynamic
        disabled: false

      # Scorecards plugin (frontend + backend)
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-scorecard:bs_1.42.5__1.0.0!red-hat-developer-hub-backstage-plugin-scorecard
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              red-hat-developer-hub.backstage-plugin-scorecard:
                mountPoints:
                  - mountPoint: entity.page.overview/cards
                    importName: EntityScorecardContent
                    config:
                      layout:
                        gridColumnEnd: span 4
                    if:
                      allOf:
                        - isKind: component
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-scorecard-backend:bs_1.42.5__1.0.0!red-hat-developer-hub-backstage-plugin-scorecard-backend
        disabled: false

      # Jira plugin (frontend overview card, unbundled in 1.9)
      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/roadiehq-backstage-plugin-jira:bs_1.45.3__2.14.0'
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              roadiehq.backstage-plugin-jira:
                mountPoints:
                  - mountPoint: entity.page.overview/cards
                    importName: EntityJiraOverviewCard
                    config:
                      layout:
                        gridColumn: 1 / -1

      # Jira plugin (backend data source for Scorecards)
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-scorecard-backend-module-jira:bs_1.42.5__1.0.1!red-hat-developer-hub-backstage-plugin-scorecard-backend-module-jira
        disabled: false

      # Quay plugin (unbundled in 1.9)
      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-quay:bs_1.45.3__1.28.1'
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-quay:
                mountPoints:
                  - mountPoint: entity.page.image-registry/cards
                    importName: QuayPage
                    config:
                      layout:
                        gridColumn: 1 / -1
                    if:
                      allOf:
                        - isKind: component
                entityTabs:
                  - path: /image-registry
                    title: Image Registry
                    mountPoint: entity.page.image-registry

      # Ansible plugins for AAP integration
      - disabled: false
        package: >-
          oci://registry.redhat.io/ansible-automation-platform/automation-portal:2.0!ansible-plugin-backstage-rhaap
        pluginConfig:
          dynamicPlugins:
            frontend:
              ansible.plugin-backstage-rhaap:
                appIcons:
                  - importName: AnsibleLogo
                    name: AnsibleLogo
                dynamicRoutes:
                  - importName: AnsiblePage
                    menuItem:
                      icon: AnsibleLogo
                      text: Ansible
                    path: /ansible
      - disabled: false
        package: >-
          oci://registry.redhat.io/ansible-automation-platform/automation-portal:2.0!ansible-plugin-scaffolder-backend-module-backstage-rhaap

      {{- if .Values.devMode }}
      # Dev-only plugins
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/proberaum-backstage-plugin-icon-viewer:next__0.1.2!proberaum-backstage-plugin-icon-viewer
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              proberaum.backstage-plugin-icon-viewer:
                translationResources:
                  - importName: iconViewerTranslations
                    ref: iconViewerTranslationRef
                dynamicRoutes:
                  - importName: IconViewerPage
                    path: /icon-viewer
                    menuItem:
                      text: Icon viewer
      {{- end }}